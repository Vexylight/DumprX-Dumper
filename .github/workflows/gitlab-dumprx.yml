name: Firmware Dump

on:
  workflow_dispatch:
    inputs:
      FIRMWARE_LINK:
        description: 'Firmware Link'
        required: true
        default: ''

jobs:
  build:
    name: Dump by ${{ github.actor }}
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main
      
    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12
        
    - name: Setup Dump Environment
      run: |
        mkdir -p workspace && cd workspace
        git clone --depth=1 https://github.com/DumprX/DumprX.git ./dumprx
        cd dumprx && bash setup.sh

    - name: Dump Firmware
      run: |
        cd workspace/dumprx
        bash dumper.sh ${{ github.event.inputs.FIRMWARE_LINK }}
        cd out
        
        # Extract Manufacturer
        echo "MANUFACTURER_NAME=$(grep "ro.product.vendor.manufacturer" vendor/build.prop | awk -F "=" '{split($2, words, " "); print words[1]; exit}')" >> $GITHUB_ENV

        # Extract the Full Build String for Repo Name
        # Format: a34xdxx-user 15 AP3A.240905.015.A2 A346EXXSADYG1 release-keys
        RAW_BUILD_STRING=$(grep "^## " device_info.txt | sed 's/^## //')
        
        # Sanitize: Replace spaces with hyphens for valid GitLab repo name
        # Result: a34xdxx-user-15-AP3A.240905.015.A2-A346EXXSADYG1-release-keys
        SAFE_REPO_NAME=$(echo "$RAW_BUILD_STRING" | tr ' ' '-')
        
        echo "REPO_NAME=${SAFE_REPO_NAME}" >> $GITHUB_ENV
        echo "Generated Repo Name: ${SAFE_REPO_NAME}"

    - name: Set Variables - if oplus
      if: env.MANUFACTURER_NAME == 'oplus'
      run: |
        cd workspace/dumprx/out
        rm -rf .git
        if [ -d odm ]; then
           echo "ODM directory exist..."
        else
           echo "Making fake ODM directory..."
           mkdir -p odm && cd odm
           echo "ro.vendor.oplus.market.name=ossi-${{ github.run_id }}" > build.prop
           cd ..
        fi
        echo "VENDOR_NAME=$(grep "ro.vendor.oplus.market.name" odm/build.prop | awk -F "=" '{split($2, words, " "); print words[1]; exit}')" >> $GITHUB_ENV
        echo "BRANCH=$(grep "ro.vendor.build.id" vendor/build.prop | awk -F "=" '{split($2, words, " "); print words[1]; exit}')" >> $GITHUB_ENV

    - name: Set Variables - if others
      if: env.MANUFACTURER_NAME != 'oplus'
      run: |
        cd workspace/dumprx/out
        rm -rf .git
        echo "VENDOR_NAME=$(grep "ro.product.vendor.device" vendor/build.prop | awk -F "=" '{split($2, words, " "); print words[1]; exit}')" >> $GITHUB_ENV
        echo "BRANCH=$(grep "ro.vendor.build.id" vendor/build.prop | awk -F "=" '{split($2, words, " "); print words[1]; exit}')" >> $GITHUB_ENV

    - name: Check or Create GitLab Repository
      run: |
        cd workspace
        
        # Determine Username
        GL_USER="${{ secrets.GITLAB_USERNAME }}"
        if [ -z "$GL_USER" ]; then
          GL_USER="${{ secrets.GITLAB_TOKEN_NAME }}"
        fi
        
        if [ -z "$GL_USER" ]; then
          echo "::error::GitLab Username not found in secrets."
          exit 1
        fi

        echo "🔍 Checking for repo: ${GL_USER}/${{ env.REPO_NAME }}"

        # Check if repo exists
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --header "PRIVATE-TOKEN: ${{ secrets.GITLAB_TOKEN }}" "https://gitlab.com/api/v4/projects/${GL_USER}%2F${{ env.REPO_NAME }}")
        
        if [ "$HTTP_STATUS" -eq 200 ]; then
          echo "✅ Repository already exists. Skipping creation."
          echo "REPO_EXISTS=true" >> $GITHUB_ENV
          curl -s --header "PRIVATE-TOKEN: ${{ secrets.GITLAB_TOKEN }}" "https://gitlab.com/api/v4/projects/${GL_USER}%2F${{ env.REPO_NAME }}" > repo.json
        else
          echo "🆕 Repository not found. Creating new repo..."
          echo "REPO_EXISTS=false" >> $GITHUB_ENV
          # Create new repo with the sanitized build string name
          curl --header "PRIVATE-TOKEN: ${{ secrets.GITLAB_TOKEN }}" -X POST "https://gitlab.com/api/v4/projects?name=${{ env.REPO_NAME }}&visibility=public" > repo.json
        fi
        
        # Extract Namespace from JSON
        if command -v python3 &>/dev/null; then
          EXTRACTED_USER=$(cat repo.json | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('namespace', {}).get('path', ''))")
        else
          EXTRACTED_USER="$GL_USER"
        fi

        if [ -z "$EXTRACTED_USER" ]; then
          EXTRACTED_USER="$GL_USER"
        fi

        echo "USERNAME=${EXTRACTED_USER}" >> $GITHUB_ENV
        echo "Final Repo Name: ${{ env.REPO_NAME }}"
        echo "Final Username: ${EXTRACTED_USER}"

    - name: Push to GitLab
      run: |
        cd workspace/dumprx/out
        rm -rf .git
        rm -rf .gitignore
        rm -rf .gitattributes
        
        DUMP_DIR_LIST=$(find -type d -not -empty -printf "%P\n" | grep -v / | grep -v .git)
        
        git init
        git lfs install

        # Fix RPC / HTTP/2 errors with large pushes
        git config --global http.version HTTP/1.1
        git config --global http.postBuffer 524288000   # 500 MB
        git config --global http.lowSpeedLimit 0
        git config --global http.lowSpeedTime 999999

        # Set Git identity
        git config --global user.name "VexLight"
        git config --global user.email "vexlight99@gmail.com"

        # Generate .gitignore for sensitive files
        find . \( -name "*sensetime*" -o -name "*.lic" \) | cut -d'/' -f'2-' >| .gitignore
        
        # Use BRANCH as the branch name (e.g., A346EXXSADYG1)
        git branch -M ${{ env.BRANCH }}
        
        # Remote URL
        REMOTE_URL="https://${{ secrets.GITLAB_TOKEN_NAME }}:${{ secrets.GITLAB_TOKEN }}@gitlab.com/${{ env.USERNAME }}/${{ env.REPO_NAME }}.git"
        
        echo "🚀 Pushing to: $REMOTE_URL"
        git remote add origin $REMOTE_URL

        # Track large files with LFS
        find . -type f -size +100M -exec git lfs track {} \;

        if [ -f .gitattributes ]; then
            git add .gitattributes
            git commit -s -m "Setup Git LFS"
        fi

        for dir in ${DUMP_DIR_LIST}; do
            git add ${dir}
            git commit -s -m "dump: ${dir}: import dump for ${{ env.VENDOR_NAME }}
        Firmware: ${{ github.event.inputs.FIRMWARE_LINK }}"
        done

        git add .
        git commit -s -m "dump: import remaining dump for ${{ env.VENDOR_NAME }}
        Firmware: ${{ github.event.inputs.FIRMWARE_LINK }}"
        
        # Push to the branch
        git push -u origin ${{ env.BRANCH }}
